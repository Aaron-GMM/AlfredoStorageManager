server {
    listen 80;
    server_name _; # Responde a qualquer domínio ou IP que chegar no Nginx

    # Raiz do projeto apontando diretamente para os arquivos físicos do frontend
    root /home/alfredoserver/AppsDeploy/go_server/Frontend;
    index index.html;

    # Otimização básica de performance para arquivos estáticos
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|woff2|woff|ttf|svg|eot)$ {
        expires max;
        log_not_found off;
        access_log off;
    }

    # Bloco para servir o Frontend
    # O try_files tenta entregar o arquivo real primeiro. Se não existir, redireciona para o index.html (SPA fallback)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy Reverso: Redireciona tudo que for /api/ para o backend em Go rodando na porta 8080
    location /api/ {
        proxy_pass http://127.0.0.1:8080/api/;
        
        # Repassa os headers originais do cliente para o backend Go
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy Reverso: Redireciona tudo que for rota protegida (ex: /files, /download) para o Go
    # Como as rotas em Go não têm prefixo /api (ex: /files, /upload), mapeamos essas locations separadamente.
    location ~ ^/(files|create-folder|delete|rename|download|upload)(/.*)?$ {
        proxy_pass http://127.0.0.1:8080;
        
        # Importante não definir limites muito baixos de buffering se quisermos focar em consumo de RAM baixo
        # O Nginx irá fazer o buffer dos uploads e downloads para aliviar o Go
        client_max_body_size 0; # Permite uploads sem limite de tamanho
        
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
